{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-8 text-center">
    <div class="card p-5">
      <h1 class="display-5 fw-bold text-primary mb-3">Sistema de Rotinas</h1>
      <p class="lead text-muted mb-4">Organize suas atividades diarias e acompanhe seu progresso.</p>
      {% if not current_user.is_authenticated %}
      <div>
        <a href="{{ url_for('auth.register') }}" class="btn btn-primary btn-lg me-2 px-4">Comecar agora</a>
        <a href="{{ url_for('auth.login') }}" class="btn btn-outline-secondary btn-lg px-4">Ja tenho conta</a>
      </div>
      {% else %}
      <a href="{{ url_for('rotinas.listar') }}" class="btn btn-success btn-lg px-4">Ver Minhas Rotinas</a>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
